name: Adventure Companion Quality Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-checks:
    name: JavaScript and weather checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check service-worker.js
          node --check weather-service.js
          node --check weather-ui.js
          node --check weather-service.test.js
          node --check packing.js
          node --check packing.test.js
          node --check daily-weather.test.js
          node --check dashboard-redesign.test.js

      - name: Run weather service tests
        run: |
          node weather-service.test.js
          node daily-weather.test.js
          node dashboard-redesign.test.js

      - name: Run packing tests
        run: node packing.test.js

      - name: Verify required application files
        shell: bash
        run: |
          required_files=(
            index.html
            app.js
            styles.css
            service-worker.js
            manifest.webmanifest
            weather-service.js
            weather-ui.js
            packing.js
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

          echo "All required application files are present."

      - name: Verify weather integration
        shell: bash
        run: |
          grep -q 'id="weatherCard"' index.html
          grep -q 'src="weather-service.js"' index.html
          grep -q 'src="weather-ui.js"' index.html

          service_line=$(grep -n 'src="weather-service.js"' index.html | head -1 | cut -d: -f1)
          ui_line=$(grep -n 'src="weather-ui.js"' index.html | head -1 | cut -d: -f1)

          if [[ -z "$service_line" || -z "$ui_line" || "$service_line" -ge "$ui_line" ]]; then
            echo "weather-service.js must load before weather-ui.js"
            exit 1
          fi

          echo "Weather card and script order are correct."

      - name: Verify Build Commit #004.1 integrations
        shell: bash
        run: |
          grep -q 'adventureSummary' app.js
          grep -q 'adventureWeather' app.js
          grep -q 'Adaptive Adventure' app.js
          grep -q 'Smart Stop Cards are today' app.js
          grep -q 'loadTripForecast' app.js
          ! grep -q 'class=timeline' app.js
          ! grep -q 'Route, driving & parking' app.js
          ! grep -q 'Foodie callout' app.js
          grep -q 'M3-04.1' app.js
          grep -q 'Kaseryn' packing.js
          grep -q 'Bubbe' packing.js
          grep -q 'Papa' packing.js
          echo "Build Commit #004.1 integration checks passed."
